<svg width="1280" height="320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1608" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0A0A0B" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="coinGlow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coinGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bgGlow)"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#D4AF37" opacity="0.07"/>
  </pattern>
  <rect width="1280" height="320" fill="url(#dots)"/>

  <!-- Top/bottom gold border lines -->
  <rect width="1280" height="2" y="0" fill="#D4AF37" opacity="0.5"/>
  <rect width="1280" height="2" y="318" fill="#D4AF37" opacity="0.5"/>

  <!-- LEFT COIN decoration -->
  <circle cx="148" cy="160" r="110" fill="url(#coinGlow1)"/>
  <circle cx="148" cy="160" r="108" fill="none" stroke="#D4AF37" stroke-width="1.5" opacity="0.25"/>
  <circle cx="148" cy="160" r="90"  fill="none" stroke="#D4AF37" stroke-width="1"   opacity="0.18"/>
  <circle cx="148" cy="160" r="70"  fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.12"/>
  <!-- Coin cross lines -->
  <line x1="40"  y1="160" x2="256" y2="160" stroke="#D4AF37" stroke-width="0.5" opacity="0.15"/>
  <line x1="148" y1="52"  x2="148" y2="268" stroke="#D4AF37" stroke-width="0.5" opacity="0.15"/>
  <!-- Coin symbol -->
  <text x="148" y="178" font-family="Georgia, serif" font-size="64" fill="#D4AF37" text-anchor="middle" opacity="0.55" filter="url(#glow)">₴</text>
  <!-- AV label -->
  <text x="148" y="228" font-family="monospace" font-size="11" fill="#D4AF37" text-anchor="middle" opacity="0.4" letter-spacing="4">· · АВЕРС · ·</text>

  <!-- RIGHT COIN decoration -->
  <circle cx="1132" cy="160" r="110" fill="url(#coinGlow2)"/>
  <circle cx="1132" cy="160" r="108" fill="none" stroke="#D4AF37" stroke-width="1.5" opacity="0.25"/>
  <circle cx="1132" cy="160" r="90"  fill="none" stroke="#D4AF37" stroke-width="1"   opacity="0.18"/>
  <circle cx="1132" cy="160" r="70"  fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.12"/>
  <!-- Coin cross lines -->
  <line x1="1024" y1="160" x2="1240" y2="160" stroke="#D4AF37" stroke-width="0.5" opacity="0.15"/>
  <line x1="1132" y1="52"  x2="1132" y2="268" stroke="#D4AF37" stroke-width="0.5" opacity="0.15"/>
  <!-- Coin eagle symbol -->
  <text x="1132" y="178" font-family="Georgia, serif" font-size="64" fill="#D4AF37" text-anchor="middle" opacity="0.55" filter="url(#glow)">⚜</text>
  <text x="1132" y="228" font-family="monospace" font-size="11" fill="#D4AF37" text-anchor="middle" opacity="0.4" letter-spacing="4">· · РЕВЕРС · ·</text>

  <!-- CENTER: main title -->
  <text x="640" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#D4AF37" text-anchor="middle" filter="url(#softGlow)" letter-spacing="2">ATR NumiScan AI</text>

  <!-- Divider line under title -->
  <line x1="360" y1="126" x2="920" y2="126" stroke="#D4AF37" stroke-width="1" opacity="0.35"/>

  <!-- Subtitle -->
  <text x="640" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="21" fill="rgba(255,255,255,0.65)" text-anchor="middle" letter-spacing="0.5">Нумізматичний каталог з AI-розпізнаванням монет</text>

  <!-- Divider line above tech stack -->
  <line x1="360" y1="200" x2="920" y2="200" stroke="#D4AF37" stroke-width="0.5" opacity="0.2"/>

  <!-- Tech stack badges row -->
  <text x="640" y="232" font-family="monospace" font-size="13" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="1">Node.js + Express · React 19 · Vite · SQLite · Gemini AI · Tailwind CSS v4</text>

  <!-- Bottom tag line -->
  <text x="640" y="268" font-family="monospace" font-size="11" fill="#D4AF37" text-anchor="middle" opacity="0.45" letter-spacing="3">КОЛЕКЦІОНУЙ · РОЗПІЗНАВАЙ · АНАЛІЗУЙ</text>

  <!-- Small decorative diamonds -->
  <text x="340" y="170" font-size="16" fill="#D4AF37" opacity="0.3">◆</text>
  <text x="928" y="170" font-size="16" fill="#D4AF37" opacity="0.3">◆</text>
</svg>
